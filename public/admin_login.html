<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Super Admin Login - POS</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(
          135deg,
          #1e3c72 0%,
          #2a5298 100%
        ); /* Slightly darker, more "admin" feel */
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        max-width: 420px;
        width: 100%;
        padding: 40px;
        animation: slideUp 0.5s ease;
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      .header h1 {
        font-size: 26px;
        color: #2c3e50;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .header p {
        color: #7f8c8d;
        font-size: 14px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 600;
        font-size: 14px;
      }
      input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s ease;
        font-family: inherit;
      }
      input:focus {
        outline: none;
        border-color: #1e3c72;
        box-shadow: 0 0 0 3px rgba(30, 60, 114, 0.1);
      }
      .password-toggle {
        position: relative;
      }
      .toggle-icon {
        position: absolute;
        right: 15px;
        top: 14px;
        cursor: pointer;
        color: #7f8c8d;
      }
      .submit-btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }
      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(30, 60, 114, 0.4);
      }
      .alert-message {
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: none;
      }
      .alert-message.show {
        display: block;
      }
      .alert-error {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .alert-success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .admin-badge {
        display: inline-block;
        background: #e74c3c;
        color: white;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        vertical-align: top;
        margin-left: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>
          <i class="fas fa-shield-alt"></i>
          System Access <span class="admin-badge">ADMIN</span>
        </h1>
        <p>Authorized personnel only</p>
      </div>

      <!-- Alerts -->
      <div id="errorMessage" class="alert-message alert-error">
        <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
      </div>
      <div id="successMessage" class="alert-message alert-success">
        <i class="fas fa-check-circle"></i> Access granted! Redirecting...
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email"
            ><i class="fas fa-envelope"></i> Email Address</label
          >
          <input
            type="email"
            id="email"
            required
            placeholder="admin@domain.com"
          />
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <div class="password-toggle">
            <input
              type="password"
              id="password"
              required
              placeholder="Enter password"
            />
            <i class="fas fa-eye toggle-icon" id="togglePassword"></i>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          <i class="fas fa-sign-in-alt"></i> Authenticate
        </button>
      </form>
    </div>

    <script>
      document
        .getElementById("togglePassword")
        .addEventListener("click", function (e) {
          const passwordInput = document.getElementById("password");
          if (passwordInput.type === "password") {
            passwordInput.type = "text";
            this.classList.remove("fa-eye");
            this.classList.add("fa-eye-slash");
          } else {
            passwordInput.type = "password";
            this.classList.remove("fa-eye-slash");
            this.classList.add("fa-eye");
          }
        });

      document
        .getElementById("loginForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          const submitBtn = document.getElementById("submitBtn");
          const errorMessage = document.getElementById("errorMessage");
          const errorText = document.getElementById("errorText");
          const successMessage = document.getElementById("successMessage");

          errorMessage.classList.remove("show");
          successMessage.classList.remove("show");

          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

          try {
            const response = await fetch("/api/v1/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });

            const data = await response.json();

            if (response.ok && data.token) {
              // Store auth data securely
              localStorage.setItem("jwt_token", data.token);
              localStorage.setItem("user", JSON.stringify(data.user));

              successMessage.classList.add("show");

              // Fast redirect to dashboard
              setTimeout(() => window.location.replace("index.html"), 800);
            } else {
              errorText.textContent =
                data.error || "Access denied. Invalid credentials.";
              errorMessage.classList.add("show");
              submitBtn.disabled = false;
              submitBtn.innerHTML =
                '<i class="fas fa-sign-in-alt"></i> Authenticate';
            }
          } catch (err) {
            errorText.textContent = "Connection error. Is the server running?";
            errorMessage.classList.add("show");
            submitBtn.disabled = false;
            submitBtn.innerHTML =
              '<i class="fas fa-sign-in-alt"></i> Authenticate';
          }
        });
    </script>
  </body>
</html>
